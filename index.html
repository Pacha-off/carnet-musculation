<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F8F4">
<title>Carnet de musculation</title>
<style>
  html, body { margin:0; padding:0; background:#F7F8F4; -webkit-text-size-adjust:100%; }
  :root{
    --bg:#F7F8F4; --panel:#FFFFFF; --line:#E6E8E1; --line2:#D4D7CD;
    --text:#161B12; --muted:#4F5E48; --dim:#A6AE9C;
    --acc-accu:#5A9EC8; --acc-int:#7ABF5A; --acc-pic:#D4753A; --acc-deload:#BF5A9E; --acc-extra:#7A7A7A;
    --gold:#C8A03A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  button, .gate-user, .block-tab, .day-tab, .block-add, .block-del, .wk-btn, .del-btn, .gate-user-del, .user-bar-switch, .add-row-btn{touch-action:manipulation;}
  .clog{font-family:'DM Sans','Segoe UI',sans-serif;color:var(--text);background:var(--bg);min-height:100vh;padding-bottom:calc(50px + env(safe-area-inset-bottom));}
  .mono{font-family:'JetBrains Mono','Courier New',monospace;}
  .clog input{font-family:'JetBrains Mono','Courier New',monospace;}

  /* Header */
  .c-head{background:linear-gradient(135deg,#FFFFFF 0%,#F7F8F4 100%);border-bottom:1px solid var(--line);padding:26px 22px 18px;}
  .c-head-inner{max-width:980px;margin:0 auto;}
  .c-eyebrow{font-size:10px;letter-spacing:.3em;color:var(--gold);font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
  .c-title{margin:0;font-size:clamp(23px,4.6vw,33px);font-weight:600;letter-spacing:-0.02em;}
  .c-sub{margin:6px 0 0;font-size:12.5px;color:var(--muted);}

  .wrap{max-width:980px;margin:0 auto;padding:18px 16px 0;}

  /* Block tabs */
  .block-row{display:flex;gap:6px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .block-tab{padding:8px 14px;background:var(--panel);border:1px solid var(--line);border-radius:5px;cursor:pointer;font-size:12.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;transition:all .15s;}
  .block-tab.active{background:var(--gold);border-color:var(--gold);color:#FFFFFF;font-weight:700;}
  .block-add{padding:8px 12px;background:transparent;border:1px dashed var(--line2);border-radius:5px;cursor:pointer;font-size:12.5px;color:var(--dim);font-family:'JetBrains Mono',monospace;}
  .block-add:hover{color:var(--gold);border-color:var(--gold);}
  .block-del{padding:8px 10px;background:transparent;border:1px solid var(--line);border-radius:5px;cursor:pointer;font-size:11.5px;color:#8a4a4a;font-family:'JetBrains Mono',monospace;}

  .block-name-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .block-name-input{background:transparent;border:none;border-bottom:1px solid var(--line2);color:var(--text);font-size:17px;font-weight:600;padding:4px 2px;outline:none;font-family:'DM Sans',sans-serif;}
  .block-name-input:focus{border-color:var(--gold);}

  /* Phase legend */
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;background:var(--panel);border:1px solid var(--line);border-radius:6px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}
  .legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .legend-rir{font-weight:700;letter-spacing:.02em;}

  /* Day tabs */
  .day-row{display:flex;gap:6px;margin-bottom:14px;}
  .day-tab{flex:1;padding:9px 6px;background:var(--panel);border:1px solid var(--line);border-radius:5px;cursor:pointer;font-size:11.5px;letter-spacing:.1em;font-weight:700;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:center;transition:all .15s;}
  .day-tab.active{color:var(--text);border-color:var(--line2);background:#16191600;}
  .day-tab .dtl{font-size:10px;opacity:.65;margin-top:2px;letter-spacing:.05em;font-weight:400;}

  .day-title-edit{width:100%;background:transparent;border:none;color:var(--text);font-size:15.5px;font-weight:600;padding:10px 2px;margin-bottom:8px;outline:none;border-bottom:1px solid var(--line);}
  .day-title-edit:focus{border-color:var(--gold);}

  /* Table */
  .tbl-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:6px;background:var(--panel);}
  table.log{width:100%;border-collapse:collapse;font-size:13px;}
  table.log th, table.log td{padding:9px 8px;border-bottom:1px solid var(--line);white-space:nowrap;}
  table.log th{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;color:var(--muted);text-align:center;font-weight:600;border-bottom:1px solid var(--line2);position:sticky;top:0;}
  table.log td.col-ex{position:sticky;left:0;background:var(--panel);min-width:200px;white-space:normal;border-right:1px solid var(--line2);z-index:2;}
  table.log th.col-ex{position:sticky;left:0;background:var(--panel);z-index:3;border-right:1px solid var(--line2);text-align:left;min-width:200px;}
  .ex-name-input{width:100%;background:transparent;border:none;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;padding:2px 0;resize:none;line-height:1.3;overflow:hidden;}
  .ex-target-input{width:100%;background:transparent;border:none;color:var(--muted);font-size:15px;font-family:'JetBrains Mono',monospace;outline:none;padding:1px 0;}
  .ex-meta-row{display:flex;flex-direction:column;gap:1px;margin-top:3px;}
  .ex-rest-input{width:100%;background:transparent;border:none;border-top:1px solid var(--line2);color:#5A9EC8;font-size:12.5px;font-family:'JetBrains Mono',monospace;outline:none;padding:3px 0 0 0;}
  .ex-rest-input::placeholder, .ex-target-input::placeholder{color:#D6D9CC;}
  td.col-week{text-align:center;}
  .wcell-group{display:flex;flex-direction:column;gap:4px;width:60px;margin:0 auto;}
  .wcell-labels{display:flex;justify-content:space-between;padding:0 2px;margin-bottom:1px;}
  .wcell-label{font-size:7px;letter-spacing:.1em;color:var(--dim);font-family:'JetBrains Mono',monospace;}
  .wcell{width:100%;background:#08090800;border:1px solid var(--line2);border-radius:4px;color:var(--text);text-align:center;padding:6px 2px;font-size:16px;font-weight:600;outline:none;}
  .wcell-reps{color:#5C6B54;font-weight:500;font-size:14px;}
  .wcell:focus{border-color:var(--gold);background:#C8A03A0A;}
  .wcell::placeholder{color:#D6D9CC;font-weight:400;}
  th.col-week-head{padding:6px 4px 4px;}
  .phase-pill{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:8px;margin-bottom:4px;}
  .col-spark{text-align:center;min-width:70px;}
  .col-del{text-align:center;width:30px;}
  .del-btn{background:transparent;border:none;color:#C9CCC0;cursor:pointer;font-size:14px;}
  .del-btn:hover{color:#A85050;}

  .add-row-btn{display:block;width:100%;padding:10px;background:transparent;border:none;border-top:1px solid var(--line);color:var(--dim);font-size:11.5px;letter-spacing:.08em;font-family:'JetBrains Mono',monospace;cursor:pointer;text-align:left;padding-left:14px;}
  .add-row-btn:hover{color:var(--gold);}

  .week-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:10px;}
  .wk-btn{padding:6px 10px;background:transparent;border:1px dashed var(--line2);border-radius:4px;color:var(--dim);font-size:10.5px;font-family:'JetBrains Mono',monospace;cursor:pointer;}
  .wk-btn:hover{color:var(--gold);border-color:var(--gold);}

  .status{font-size:10.5px;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:.08em;margin-top:14px;text-align:right;}
  .status.saved{color:var(--acc-int);}

  .loading{padding:60px 20px;text-align:center;color:var(--muted);font-size:13px;font-family:'JetBrains Mono',monospace;}

  .foot-note{margin-top:26px;padding-top:16px;border-top:1px solid var(--line);font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;line-height:1.8;}

  /* User gate */
  .gate{display:flex;align-items:center;justify-content:center;padding:50px 10px;min-height:320px;}
  .gate-card{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:26px 22px;}
  .gate-label{font-size:10px;letter-spacing:.25em;color:var(--gold);font-family:'JetBrains Mono',monospace;margin-bottom:18px;text-align:center;}
  .gate-users{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
  .gate-user-row{display:flex;align-items:center;gap:6px;}
  .gate-user{flex:1;display:flex;align-items:center;gap:10px;padding:11px 12px;background:#F1F2EC;border:1px solid var(--line2);border-radius:7px;color:var(--text);cursor:pointer;font-size:14.5px;font-family:'DM Sans',sans-serif;text-align:left;transition:all .15s;}
  .gate-user:hover{border-color:var(--gold);background:#C8A03A0C;}
  .gate-avatar{width:26px;height:26px;border-radius:50%;background:var(--gold);color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0;}
  .gate-user-del{background:transparent;border:none;color:#C9CCC0;cursor:pointer;font-size:14px;padding:6px;}
  .gate-user-del:hover{color:#A85050;}
  .gate-empty{font-size:12px;color:var(--muted);text-align:center;margin-bottom:18px;line-height:1.7;}
  .gate-new{display:flex;gap:6px;}
  .gate-input{flex:1;background:#F1F2EC;border:1px solid var(--line2);border-radius:6px;color:var(--text);padding:10px 10px;font-size:13.5px;outline:none;font-family:'DM Sans',sans-serif;}
  .gate-input:focus{border-color:var(--gold);}
  .gate-create{background:var(--gold);border:1px solid var(--gold);border-radius:6px;color:#FFFFFF;font-weight:700;padding:10px 14px;font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer;letter-spacing:.04em;}
  .gate-create:hover{background:#B38E2E;}

  /* User bar inside app */
  .user-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:9px 12px;background:var(--panel);border:1px solid var(--line);border-radius:6px;}
  .user-bar-name{font-size:13.5px;color:var(--text);font-family:'DM Sans',sans-serif;}
  .user-bar-name b{color:var(--gold);}
  .user-bar-switch{background:transparent;border:1px solid var(--line2);border-radius:5px;padding:6px 10px;color:var(--muted);font-size:10.5px;font-family:'JetBrains Mono',monospace;cursor:pointer;letter-spacing:.05em;}
  .user-bar-switch:hover{color:var(--gold);border-color:var(--gold);}

  /* ── OPTIMISATION MOBILE ── */
  @media (max-width: 600px){
    .c-head{padding:20px 14px 14px;}
    .wrap{padding:14px 10px 0;}
    .c-sub{font-size:12px;}

    /* Table : colonnes plus compactes, plus de colonnes visibles sans scroller */
    table.log th, table.log td{padding:7px 5px;}
    table.log td.col-ex, table.log th.col-ex{min-width:165px;}
    .ex-name-input{font-size:13.5px;}
    .wcell-group{width:60px;}
    .wcell{font-size:17px;padding:7px 2px;}
    .wcell-reps{font-size:15px;}
    .col-spark{min-width:54px;}
    table.log{font-size:12.5px;}
    .tbl-scroll{-webkit-overflow-scrolling:touch;}

    /* Boutons : cibles tactiles plus grandes */
    .block-tab, .day-tab{padding:10px 6px;}
    .block-add, .block-del, .wk-btn{padding:9px 11px;}
    .del-btn{padding:6px 8px;font-size:16px;}
    .add-row-btn{padding:13px 14px;}

    /* Empêche le zoom automatique iOS sur les champs de saisie */
    .wcell, .gate-input, .block-name-input, .day-title-edit{font-size:17px;}
    .ex-target-input, .ex-rest-input{font-size:16px;}

    .user-bar{padding:10px;}
    .user-bar-name{font-size:13px;}
    .user-bar-switch{padding:8px 10px;}

    .gate-card{padding:22px 16px;}
    .gate-user{padding:13px 12px;font-size:15px;}
  }

  @media (max-width: 380px){
    table.log td.col-ex, table.log th.col-ex{min-width:140px;}
    .wcell-group{width:52px;}
    .wcell{font-size:16px;}
    .wcell-reps{font-size:14px;}
  }
</style>
</head>
<body>

<div class="clog" id="clog-root">
  <div class="c-head">
    <div class="c-head-inner">
      <div class="c-eyebrow">CARNET D'ENTRAÎNEMENT · VERSION HORS-LIGNE</div>
      <h1 class="c-title">Ton journal de charges</h1>
      <p class="c-sub">Renseigne le poids soulevé chaque semaine. La progression se lit directement sur chaque ligne.</p>
    </div>
  </div>
  <div class="wrap" id="clog-body">
    <div class="loading">Chargement du carnet…</div>
  </div>
</div>

<script>
(function(){
  const USERS_KEY = "carnet_users_list_v1";
  const LAST_USER_KEY = "carnet_last_user_v1";
  let currentUser = null;

  function getUsers(){
    try{ return JSON.parse(localStorage.getItem(USERS_KEY) || "[]"); }
    catch(e){ return []; }
  }
  function saveUsers(list){
    try{ localStorage.setItem(USERS_KEY, JSON.stringify(list)); }
    catch(e){ console.error("Storage error:", e); }
  }
  function dataKey(){ return "carnet_data_v1::" + currentUser; }

  const PHASES = {
    accu:    { label: "Accumulation", color: "#5A9EC8", rir: "RIR 3" },
    inten:   { label: "Intensification", color: "#7ABF5A", rir: "RIR 2→1" },
    pic:     { label: "Pic", color: "#D4753A", rir: "RIR 0–1" },
    deload:  { label: "Deload", color: "#BF5A9E", rir: "RIR 4–5" },
    extra:   { label: "Continuité", color: "#7A7A7A", rir: "RIR 2" },
  };

  function defaultWeeks(){
    return [
      { label: "S1", phase: "accu" },
      { label: "S2", phase: "accu" },
      { label: "S3", phase: "inten" },
      { label: "S4", phase: "inten" },
      { label: "S5", phase: "inten" },
      { label: "S6", phase: "pic" },
      { label: "S7", phase: "deload" },
    ];
  }

  function emptyWeights(n){ return Array.from({ length: n }, () => ({ kg: "", reps: "" })); }

  function normCell(v){
    if (v && typeof v === "object") return { kg: v.kg ?? "", reps: v.reps ?? "" };
    return { kg: (v ?? ""), reps: "" };
  }

  function migrateState(s){
    s.blocks.forEach(b => {
      const n = b.weeks.length;
      Object.values(b.days).forEach(d => {
        d.exercises.forEach(ex => {
          ex.weights = (ex.weights || []).map(normCell);
          while (ex.weights.length < n) ex.weights.push({ kg: "", reps: "" });
          if (ex.weights.length > n) ex.weights = ex.weights.slice(0, n);
          if (ex.rest === undefined) ex.rest = "";
        });
      });
    });
  }

  function defaultBlock(idx){
    const weeks = defaultWeeks();
    const n = weeks.length;
    return {
      id: "bloc_" + Date.now() + "_" + idx,
      name: "Bloc " + idx,
      weeks: weeks,
      days: {
        A: {
          title: "Jour A — Lundi",
          exercises: [
            { name: "Développé couché barre", target: "3×5–7", rest: "3m30", weights: emptyWeights(n) },
            { name: "Tractions", target: "3×6–8", rest: "3m30", weights: emptyWeights(n) },
            { name: "Squat", target: "3×6–8", rest: "2m30", weights: emptyWeights(n) },
            { name: "Développé militaire", target: "3×8–10", rest: "2 min", weights: emptyWeights(n) },
            { name: "Curl haltères incliné", target: "3×10–12", rest: "2 min", weights: emptyWeights(n) },
            { name: "Abdos", target: "4×15", rest: "1m30", weights: emptyWeights(n) },
            { name: "Lombaires", target: "4×15", rest: "1m30", weights: emptyWeights(n) },
          ]
        },
        B: {
          title: "Jour B — Mercredi",
          exercises: [
            { name: "Développé incliné haltères", target: "4×8–12", rest: "2m30", weights: emptyWeights(n) },
            { name: "Tirage horizontal prise large", target: "3×6–10", rest: "2 min", weights: emptyWeights(n) },
            { name: "SDT roumain", target: "3×10–15", rest: "2 min", weights: emptyWeights(n) },
            { name: "Élévations latérales", target: "3×12–20", rest: "2 min", weights: emptyWeights(n) },
            { name: "Triceps corde", target: "3×12–15", rest: "1m30", weights: emptyWeights(n) },
            { name: "Extension mollets debout", target: "3×15–20", rest: "1m45", weights: emptyWeights(n) },
            { name: "Obliques", target: "4×15", rest: "1 min", weights: emptyWeights(n) },
          ]
        },
        C: {
          title: "Jour C — Vendredi",
          exercises: [
            { name: "Tractions", target: "3×15–20", rest: "1 min", weights: emptyWeights(n) },
            { name: "Butterfly", target: "3×15–20", rest: "1 min", weights: emptyWeights(n) },
            { name: "Fentes bulgares", target: "3×15–20", rest: "1 min", weights: emptyWeights(n) },
            { name: "Face pull corde", target: "3×15–20", rest: "1m45", weights: emptyWeights(n) },
            { name: "Curl marteau banc", target: "3×15–20", rest: "1m45", weights: emptyWeights(n) },
            { name: "Abdos suspension", target: "4×15", rest: "1m30", weights: emptyWeights(n) },
            { name: "Lombaires", target: "4×15", rest: "1m30", weights: emptyWeights(n) },
          ]
        }
      }
    };
  }

  let state = null; // { blocks: [...], activeBlockId, activeDay }
  let saveTimer = null;

  async function loadState(){
    try{
      const raw = localStorage.getItem(dataKey());
      if (raw) {
        state = JSON.parse(raw);
        migrateState(state);
        return;
      }
    }catch(e){ /* storage unavailable or empty -> create default */ }
    const b1 = defaultBlock(1);
    state = { blocks: [b1], activeBlockId: b1.id, activeDay: "A" };
    await persist();
  }

  async function persist(){
    const statusEl = document.getElementById("save-status");
    try{
      localStorage.setItem(dataKey(), JSON.stringify(state));
      if (statusEl){ statusEl.textContent = "Sauvegardé ✓"; statusEl.classList.add("saved"); }
    }catch(e){
      if (statusEl){ statusEl.textContent = "Erreur de sauvegarde"; statusEl.classList.remove("saved"); }
      console.error("Storage error:", e);
    }
  }

  function scheduleSave(){
    const statusEl = document.getElementById("save-status");
    if (statusEl){ statusEl.textContent = "Enregistrement…"; statusEl.classList.remove("saved"); }
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(persist, 500);
  }

  function getActiveBlock(){
    return state.blocks.find(b => b.id === state.activeBlockId) || state.blocks[0];
  }

  function sparkline(weights, color){
    const nums = weights.map(c => parseFloat(c && c.kg)).filter(n => !isNaN(n) && n > 0);
    if (nums.length < 1) return '<span style="color:#D6D9CC;font-size:9px;">—</span>';
    const max = Math.max(...nums), min = Math.min(...nums);
    const range = max - min || 1;
    const w = 60, h = 20, n = weights.length;
    let points = [];
    weights.forEach((c, i) => {
      const val = parseFloat(c && c.kg);
      if (!isNaN(val) && val > 0) {
        const x = (i / (n - 1 || 1)) * w;
        const y = h - ((val - min) / range) * (h - 4) - 2;
        points.push([x, y]);
      }
    });
    if (points.length < 2) {
      return `<svg width="${w}" height="${h}"><circle cx="${points[0]?.[0]||0}" cy="${points[0]?.[1]||10}" r="2.5" fill="${color}"/></svg>`;
    }
    const path = points.map((p,i) => (i===0?"M":"L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
    const last = points[points.length-1];
    return `<svg width="${w}" height="${h}"><path d="${path}" fill="none" stroke="${color}" stroke-width="1.6"/><circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.5" fill="${color}"/></svg>`;
  }

  function render(){
    const body = document.getElementById("clog-body");
    const block = getActiveBlock();
    const day = block.days[state.activeDay];
    const dayColor = state.activeDay === "A" ? "#C8875A" : state.activeDay === "B" ? "#5A9EC8" : "#7ABF5A";

    let html = "";

    // User bar
    html += `<div class="user-bar"><span class="user-bar-name">👤 Profil : <b>${escapeHtml(currentUser)}</b></span><button class="user-bar-switch" data-action="switch-user">Changer de profil</button></div>`;

    // Block tabs
    html += '<div class="block-row">';
    state.blocks.forEach(b => {
      html += `<div class="block-tab ${b.id===block.id?'active':''}" data-action="select-block" data-id="${b.id}">${escapeHtml(b.name)}</div>`;
    });
    html += `<div class="block-add" data-action="add-block">+ Nouveau bloc</div>`;
    if (state.blocks.length > 1) {
      html += `<div class="block-del" data-action="del-block" data-id="${block.id}">Suppr. bloc</div>`;
    }
    html += '</div>';

    // Block name
    html += `<div class="block-name-row"><input class="block-name-input" data-action="rename-block" value="${escapeAttr(block.name)}" /></div>`;

    // Legend
    html += '<div class="legend">';
    Object.keys(PHASES).forEach(k => {
      const used = block.weeks.some(w => w.phase === k);
      if (!used) return;
      html += `<div class="legend-item"><div class="legend-dot" style="background:${PHASES[k].color}"></div>${PHASES[k].label.toUpperCase()} <span class="legend-rir" style="color:${PHASES[k].color}">${PHASES[k].rir}</span></div>`;
    });
    html += '</div>';

    // Day tabs
    html += '<div class="day-row">';
    [["A","Lundi"],["B","Mercredi"],["C","Vendredi"]].forEach(([id,label]) => {
      const active = state.activeDay === id;
      html += `<div class="day-tab ${active?'active':''}" data-action="select-day" data-id="${id}" style="${active?`border-color:${dayColor};color:#FFFFFF;background:${dayColor};font-weight:700;`:''}">${id}<div class="dtl">${label}</div></div>`;
    });
    html += '</div>';

    // Day title
    html += `<input class="day-title-edit" data-action="rename-day" value="${escapeAttr(day.title)}" />`;

    // Table
    html += '<div class="tbl-scroll"><table class="log"><thead><tr>';
    html += '<th class="col-ex">EXERCICE</th>';
    block.weeks.forEach((w, wi) => {
      const ph = PHASES[w.phase] || PHASES.extra;
      html += `<th class="col-week-head"><span class="phase-pill" style="background:${ph.color};color:#FFFFFF;">${ph.label.slice(0,4).toUpperCase()}</span><br/><input class="ex-target-input" style="text-align:center;color:${ph.color};font-size:14px;font-weight:700;" data-action="rename-week" data-week="${wi}" value="${escapeAttr(w.label)}" /></th>`;
    });
    html += '<th class="col-spark">PROGRESSION</th><th class="col-del"></th>';
    html += '</tr></thead><tbody>';

    day.exercises.forEach((ex, ei) => {
      html += '<tr>';
      html += `<td class="col-ex">
        <textarea class="ex-name-input" data-action="rename-ex" data-ex="${ei}" rows="2">${escapeHtml(ex.name)}</textarea>
        <div class="ex-meta-row">
          <input class="ex-target-input" data-action="retarget-ex" data-ex="${ei}" value="${escapeAttr(ex.target)}" placeholder="séries×reps" />
          <input class="ex-rest-input" data-action="rest-ex" data-ex="${ei}" value="${escapeAttr(ex.rest || '')}" placeholder="repos" />
        </div>
      </td>`;
      block.weeks.forEach((w, wi) => {
        const ph = PHASES[w.phase] || PHASES.extra;
        const cell = normCell(ex.weights[wi]);
        html += `<td class="col-week">
          <div class="wcell-group">
            <input type="number" step="0.5" inputmode="decimal" class="wcell" style="border-color:${ph.color}33;" placeholder="kg" data-action="weight" data-ex="${ei}" data-week="${wi}" value="${escapeAttr(cell.kg)}" />
            <input type="number" step="1" inputmode="numeric" class="wcell wcell-reps" style="border-color:${ph.color}22;" placeholder="reps" data-action="reps" data-ex="${ei}" data-week="${wi}" value="${escapeAttr(cell.reps)}" />
          </div>
        </td>`;
      });
      html += `<td class="col-spark">${sparkline(ex.weights, dayColor)}</td>`;
      html += `<td class="col-del"><button class="del-btn" data-action="del-ex" data-ex="${ei}">✕</button></td>`;
      html += '</tr>';
    });

    html += '</tbody></table>';
    html += '<button class="add-row-btn" data-action="add-ex">+ Ajouter un exercice</button>';
    html += '</div>';

    // Week actions
    html += '<div class="week-actions">';
    html += '<button class="wk-btn" data-action="add-week">+ Ajouter une semaine</button>';
    if (block.weeks.length > 1) html += '<button class="wk-btn" data-action="del-week">− Retirer dernière semaine</button>';
    html += '</div>';

    html += `<div class="status" id="save-status">—</div>`;

    html += `<div class="foot-note">
      Chaque ligne montre la progression de charge sur l'ensemble du bloc — c'est ta preuve de surcharge progressive.
      Couleurs des semaines = phase de périodisation (accumulation → intensification → pic → deload).
    </div>`;

    body.innerHTML = html;
    attachHandlers();
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s){ return escapeHtml(s); }

  function attachHandlers(){
    const body = document.getElementById("clog-body");

    const switchBtn = body.querySelector('[data-action="switch-user"]');
    if (switchBtn) switchBtn.addEventListener("click", () => { renderGate(); });

    body.querySelectorAll('[data-action="select-block"]').forEach(el => {
      el.addEventListener("click", () => { state.activeBlockId = el.dataset.id; render(); });
    });

    body.querySelectorAll('[data-action="select-day"]').forEach(el => {
      el.addEventListener("click", () => { state.activeDay = el.dataset.id; render(); });
    });

    const addBlockBtn = body.querySelector('[data-action="add-block"]');
    if (addBlockBtn) addBlockBtn.addEventListener("click", () => {
      const nb = defaultBlock(state.blocks.length + 1);
      state.blocks.push(nb);
      state.activeBlockId = nb.id;
      scheduleSave(); render();
    });

    const delBlockBtn = body.querySelector('[data-action="del-block"]');
    if (delBlockBtn) delBlockBtn.addEventListener("click", () => {
      const id = delBlockBtn.dataset.id;
      state.blocks = state.blocks.filter(b => b.id !== id);
      state.activeBlockId = state.blocks[0].id;
      scheduleSave(); render();
    });

    const renameBlockInput = body.querySelector('[data-action="rename-block"]');
    if (renameBlockInput) renameBlockInput.addEventListener("change", () => {
      getActiveBlock().name = renameBlockInput.value;
      scheduleSave();
    });

    const renameDayInput = body.querySelector('[data-action="rename-day"]');
    if (renameDayInput) renameDayInput.addEventListener("change", () => {
      getActiveBlock().days[state.activeDay].title = renameDayInput.value;
      scheduleSave();
    });

    body.querySelectorAll('[data-action="rename-week"]').forEach(el => {
      el.addEventListener("change", () => {
        const wi = parseInt(el.dataset.week, 10);
        getActiveBlock().weeks[wi].label = el.value;
        scheduleSave();
      });
    });

    body.querySelectorAll('[data-action="rename-ex"]').forEach(el => {
      el.addEventListener("change", () => {
        const ei = parseInt(el.dataset.ex, 10);
        getActiveBlock().days[state.activeDay].exercises[ei].name = el.value;
        scheduleSave();
      });
    });

    body.querySelectorAll('[data-action="retarget-ex"]').forEach(el => {
      el.addEventListener("change", () => {
        const ei = parseInt(el.dataset.ex, 10);
        getActiveBlock().days[state.activeDay].exercises[ei].target = el.value;
        scheduleSave();
      });
    });

    body.querySelectorAll('[data-action="rest-ex"]').forEach(el => {
      el.addEventListener("change", () => {
        const ei = parseInt(el.dataset.ex, 10);
        getActiveBlock().days[state.activeDay].exercises[ei].rest = el.value;
        scheduleSave();
      });
    });

    body.querySelectorAll('[data-action="weight"]').forEach(el => {
      el.addEventListener("input", () => {
        const ei = parseInt(el.dataset.ex, 10);
        const wi = parseInt(el.dataset.week, 10);
        const ex = getActiveBlock().days[state.activeDay].exercises[ei];
        ex.weights[wi] = normCell(ex.weights[wi]);
        ex.weights[wi].kg = el.value;
        scheduleSave();
        // live update sparkline only, without full re-render to keep focus
        const row = el.closest("tr");
        const sparkCell = row.querySelector(".col-spark");
        const dayColor = state.activeDay === "A" ? "#C8875A" : state.activeDay === "B" ? "#5A9EC8" : "#7ABF5A";
        if (sparkCell) sparkCell.innerHTML = sparkline(ex.weights, dayColor);
      });
    });

    body.querySelectorAll('[data-action="reps"]').forEach(el => {
      el.addEventListener("input", () => {
        const ei = parseInt(el.dataset.ex, 10);
        const wi = parseInt(el.dataset.week, 10);
        const ex = getActiveBlock().days[state.activeDay].exercises[ei];
        ex.weights[wi] = normCell(ex.weights[wi]);
        ex.weights[wi].reps = el.value;
        scheduleSave();
      });
    });

    body.querySelectorAll('[data-action="del-ex"]').forEach(el => {
      el.addEventListener("click", () => {
        const ei = parseInt(el.dataset.ex, 10);
        getActiveBlock().days[state.activeDay].exercises.splice(ei, 1);
        scheduleSave(); render();
      });
    });

    const addExBtn = body.querySelector('[data-action="add-ex"]');
    if (addExBtn) addExBtn.addEventListener("click", () => {
      const n = getActiveBlock().weeks.length;
      getActiveBlock().days[state.activeDay].exercises.push({ name: "Nouvel exercice", target: "3×10", rest: "", weights: emptyWeights(n) });
      scheduleSave(); render();
    });

    const addWeekBtn = body.querySelector('[data-action="add-week"]');
    if (addWeekBtn) addWeekBtn.addEventListener("click", () => {
      const b = getActiveBlock();
      const newLabel = "S" + (b.weeks.length + 1);
      b.weeks.push({ label: newLabel, phase: "extra" });
      Object.values(b.days).forEach(d => d.exercises.forEach(ex => ex.weights.push({ kg: "", reps: "" })));
      scheduleSave(); render();
    });

    const delWeekBtn = body.querySelector('[data-action="del-week"]');
    if (delWeekBtn) delWeekBtn.addEventListener("click", () => {
      const b = getActiveBlock();
      b.weeks.pop();
      Object.values(b.days).forEach(d => d.exercises.forEach(ex => ex.weights.pop()));
      scheduleSave(); render();
    });
  }

  function renderGate(){
    const body = document.getElementById("clog-body");
    const users = getUsers();
    let html = '<div class="gate"><div class="gate-card">';
    html += '<div class="gate-label">CHOISIR UN PROFIL</div>';
    if (users.length){
      html += '<div class="gate-users">';
      users.forEach(u => {
        html += `<div class="gate-user-row">
          <button class="gate-user" data-action="gate-select" data-name="${escapeAttr(u)}"><span class="gate-avatar">${escapeHtml(u.charAt(0).toUpperCase())}</span>${escapeHtml(u)}</button>
          <button class="gate-user-del" data-action="gate-del" data-name="${escapeAttr(u)}">✕</button>
        </div>`;
      });
      html += '</div>';
    } else {
      html += '<div class="gate-empty">Aucun profil encore.<br/>Crée le premier ci-dessous.</div>';
    }
    html += '<div class="gate-new"><input class="gate-input" id="gate-new-input" placeholder="Nouveau prénom…" maxlength="24" /><button class="gate-create" data-action="gate-create">Créer</button></div>';
    html += '</div></div>';
    body.innerHTML = html;

    body.querySelectorAll('[data-action="gate-select"]').forEach(el => {
      el.addEventListener("click", () => chooseUser(el.dataset.name));
    });

    body.querySelectorAll('[data-action="gate-del"]').forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const name = el.dataset.name;
        if (!window.confirm('Supprimer le profil "' + name + '" et tout son carnet ?')) return;
        const remaining = getUsers().filter(u => u !== name);
        saveUsers(remaining);
        try{ localStorage.removeItem("carnet_data_v1::" + name); }catch(err){}
        try{ if (localStorage.getItem(LAST_USER_KEY) === name) localStorage.removeItem(LAST_USER_KEY); }catch(err){}
        renderGate();
      });
    });

    const createBtn = body.querySelector('[data-action="gate-create"]');
    const input = body.querySelector('#gate-new-input');
    function tryCreate(){
      const name = (input.value || "").trim();
      if (!name) return;
      chooseUser(name);
    }
    if (createBtn) createBtn.addEventListener("click", tryCreate);
    if (input) input.addEventListener("keydown", (e) => { if (e.key === "Enter") tryCreate(); });
    if (input) input.focus();
  }

  async function chooseUser(name){
    const users = getUsers();
    if (!users.includes(name)) { users.push(name); saveUsers(users); }
    currentUser = name;
    try{ localStorage.setItem(LAST_USER_KEY, name); }catch(e){}
    await loadState();
    render();
  }

  // Init
  const lastUser = (function(){ try{ return localStorage.getItem(LAST_USER_KEY); }catch(e){ return null; } })();
  if (lastUser) {
    currentUser = lastUser;
    loadState().then(render).catch(err => {
      document.getElementById("clog-body").innerHTML = '<div class="loading">Erreur de chargement du carnet. Réessaie en rechargeant.</div>';
      console.error(err);
    });
  } else {
    renderGate();
  }
})();
</script>
</body>
</html>
